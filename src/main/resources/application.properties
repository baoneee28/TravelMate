# ============================================================
# TravelMate - Application Properties
# File cau hinh chinh cua ung dung Spring Boot
# ============================================================

# Ten ung dung
spring.application.name=travelmate

# ============================================================
# KET NOI MYSQL
# - url: dia chi database MySQL tren may local
# - travelmate_db: ten database se dung
# - useSSL=false: tat SSL cho moi truong dev
# - serverTimezone: set timezone Viet Nam
# - allowPublicKeyRetrieval=true: cho phep lay public key (can cho MySQL 8+)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/travelmate_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=root

# ============================================================
# JPA / HIBERNATE
# - ddl-auto=update: Hibernate tu dong cap nhat schema DB khi entity thay doi
#   (rat tien cho giai doan dev, KHONG nen dung cho production)
# - show-sql=true: in cau lenh SQL ra console de debug
# - format_sql=true: format SQL cho de doc
# - Hibernate tu dong detect MySQL dialect tu JDBC connection
#   (KHONG can chi dinh MySQL8Dialect vi da deprecated tu Hibernate 6.x)
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# CONG CHAY SERVER
# Mac dinh la 8080, doi neu can
# ============================================================
server.port=8080

# ============================================================
# THYMELEAF TEMPLATE ENGINE
# - cache=false: tat cache de khi sua template khong can restart
#   (CHI DUNG cho dev, production nen bat cache lai)
# - encoding: dung UTF-8 de ho tro tieng Viet
# - mode=HTML: xu ly file HTML5 chuan
# ============================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
