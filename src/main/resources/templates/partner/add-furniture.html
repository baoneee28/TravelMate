<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Thêm nội thất - Partner TravelMate</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
        <link rel="stylesheet" th:href="@{/assets/pages/admin.css}" />
        <link rel="stylesheet" th:href="@{/assets/pages/partners.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/responsive.css}" />
    </head>
    <body>
        <div class="admin-wrapper">
            <aside th:replace="~{fragments/partner-sidebar :: partner-sidebar}"></aside>
            <div class="admin-sidebar-overlay"></div>

            <div class="admin-main">
                <header class="admin-topbar">
                    <div style="display: flex; align-items: center; gap: var(--space-4)">
                        <button class="admin-topbar__hamburger"><span></span><span></span><span></span></button>
                        <h1 class="admin-topbar__title">Thêm nội thất cho phòng</h1>
                    </div>
                </header>
                <main class="admin-content">
                    <div class="partner-grid">
                        <section class="partner-panel">
                            <div class="partner-panel__body">
                                <div class="page-header" style="margin-bottom: var(--space-6)">
                                    <div>
                                        <h2 class="page-header__title">Danh mục nội thất</h2>
                                        <p class="page-header__subtitle">Lưu cập nhật nội thất theo từng phòng để đối soát lại hồ sơ lưu trú.</p>
                                    </div>
                                </div>

                                <form id="partner-furniture-form" class="partner-form">
                                    <div class="partner-form__grid">
                                        <div class="form-group">
                                            <label class="form-label">Chọn phòng</label>
                                            <select class="form-control" id="partner-furniture-room" name="roomId"></select>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">Nhóm nội thất</label>
                                            <select class="form-control" name="furnitureGroup">
                                                <option>Phòng ngủ</option>
                                                <option>Phòng tắm</option>
                                                <option>Ban công</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="partner-checklist">
                                        <label class="form-check"><input type="checkbox" name="furnitureItems" value="Giường king size" checked /> <span class="form-check-label">Giường king size</span></label>
                                        <label class="form-check"><input type="checkbox" name="furnitureItems" value="Tủ quần áo" checked /> <span class="form-check-label">Tủ quần áo</span></label>
                                        <label class="form-check"><input type="checkbox" name="furnitureItems" value="Bàn làm việc" checked /> <span class="form-check-label">Bàn làm việc</span></label>
                                        <label class="form-check"><input type="checkbox" name="furnitureItems" value="Sofa thư giãn" checked /> <span class="form-check-label">Sofa thư giãn</span></label>
                                        <label class="form-check"><input type="checkbox" name="furnitureItems" value="Bồn tắm nằm" /> <span class="form-check-label">Bồn tắm nằm</span></label>
                                        <label class="form-check"><input type="checkbox" name="furnitureItems" value="Bàn trà ngoài trời" checked /> <span class="form-check-label">Bàn trà ngoài trời</span></label>
                                    </div>

                                    <div class="form-group" style="margin-bottom: 0">
                                        <label class="form-label">Ghi chú cập nhật</label>
                                        <textarea name="note" class="form-control" rows="5" placeholder="Ví dụ: thay mới bộ sofa trong tháng 4, bổ sung gương toàn thân..."></textarea>
                                    </div>

                                    <div class="partner-form__actions">
                                        <button class="btn btn--primary" type="submit">Cập nhật nội thất</button>
                                    </div>
                                </form>
                            </div>
                        </section>

                        <aside class="partner-shell">
                            <section class="partner-panel">
                                <div class="partner-panel__body">
                                    <div class="partner-form__heading" style="margin-bottom: var(--space-4)">Lần cập nhật đã lưu</div>
                                    <div class="partner-chip-list" id="partner-furniture-list"></div>
                                </div>
                            </section>
                        </aside>
                    </div>
                </main>
            </div>
        </div>
        <script th:src="@{/assets/js/main.js}"></script>
        <script th:src="@{/assets/js/admin.js}"></script>
        <script th:src="@{/assets/js/partners.js}"></script>
    </body>
</html>
