<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lỗi – TravelMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <style>
        .error-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; padding:40px 20px; }
        .error-code { font-size:120px; font-weight:800; color:#0066cc; line-height:1; margin-bottom:12px; }
        .error-title { font-size:28px; font-weight:700; color:#1e293b; margin-bottom:16px; }
        .error-desc { font-size:16px; color:#64748b; margin-bottom:32px; max-width:500px; }
        .error-btn { display:inline-block; padding:14px 32px; background:#0066cc; color:#fff; border-radius:12px; text-decoration:none; font-weight:600; font-size:16px; transition:all .3s; }
        .error-btn:hover { background:#0052a3; transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,102,204,0.3); }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code" th:text="${status ?: '404'}">404</div>
        <div class="error-title" th:text="${error ?: 'Không tìm thấy trang'}">Không tìm thấy trang</div>
        <p class="error-desc" th:text="${message ?: 'Trang bạn tìm kiếm không tồn tại hoặc đã bị di chuyển.'}">
            Trang bạn tìm kiếm không tồn tại hoặc đã bị di chuyển.
        </p>
        <a th:href="@{/}" class="error-btn">← Về trang chủ</a>
    </div>
</body>
</html>
