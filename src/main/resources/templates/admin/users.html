<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quản lý người dùng – Admin TravelMate</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
        <link rel="stylesheet" th:href="@{/assets/pages/admin.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/responsive.css}" />
    </head>
    <body>
        <div class="admin-wrapper">
            <aside th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></aside>
            <div class="admin-sidebar-overlay"></div>

            <div class="admin-main">
                <header class="admin-topbar">
                    <div style="display:flex;align-items:center;gap:var(--space-4)">
                        <button class="admin-topbar__hamburger"><span></span><span></span><span></span></button>
                        <h1 class="admin-topbar__title">👥 Quản lý người dùng</h1>
                    </div>
                </header>

                <main class="admin-content">
                    <div class="page-header">
                        <div>
                            <h2 class="page-header__title">Danh sách người dùng</h2>
                            <p class="page-header__subtitle" th:text="${#lists.size(users)} + ' tài khoản đã đăng ký'">0 tài khoản</p>
                        </div>
                    </div>

                    <!-- Filter Tabs -->
                    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-5);flex-wrap:wrap">
                        <button class="filter-tab active" data-filter="all">Tất cả</button>
                        <button class="filter-tab" data-filter="user">Khách</button>
                        <button class="filter-tab" data-filter="partner">Đối tác</button>
                        <button class="filter-tab" data-filter="admin">Admin</button>
                    </div>

                    <div class="table-toolbar">
                        <div class="input-group table-toolbar__search">
                            <span class="input-group__icon">🔍</span>
                            <input type="text" class="form-control" id="table-search" placeholder="Tìm theo tên, email..." />
                        </div>
                        <div class="table-toolbar__actions">
                            <select class="form-control" id="filter-status" style="width:150px">
                                <option value="">Tất cả trạng thái</option>
                                <option value="active">Hoạt động</option>
                                <option value="blocked">Bị khóa</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-wrap">
                        <table class="table data-table">
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th>Họ và tên</th>
                                    <th>Email</th>
                                    <th>Số điện thoại</th>
                                    <th>Vai trò</th>
                                    <th>Số booking</th>
                                    <th>Ngày đăng ký</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u, iter : ${users}"
                                    th:data-role="${#strings.toLowerCase(u.role)}"
                                    th:data-active="${u.active}">
                                    <td th:text="${iter.count}">-</td>
                                    <td>
                                        <div style="display:flex;align-items:center;gap:var(--space-3)">
                                            <div style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff"
                                                 th:style="'width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff;background:' + ${u.avatarColor}"
                                                 th:text="${u.avatarInitials}">??</div>
                                            <strong th:text="${u.fullName}">-</strong>
                                        </div>
                                    </td>
                                    <td th:text="${u.email}">-</td>
                                    <td th:text="${u.phone != null ? u.phone : '–'}">-</td>
                                    <td><span class="badge" th:classappend="${u.roleBadgeClass}" th:text="${u.roleLabel}">-</span></td>
                                    <td th:text="${u.role.name() == 'USER' ? u.bookingCount : '–'}">-</td>
                                    <td th:text="${#temporals.format(u.createdAt,'dd/MM/yyyy')}">-</td>
                                    <td>
                                        <span th:if="${u.active}" class="status-dot status-dot--active">Hoạt động</span>
                                        <span th:if="${!u.active}" class="status-dot status-dot--inactive">Bị khóa</span>
                                    </td>
                                    <td>
                                        <!-- ADMIN: không thể khóa -->
                                        <button th:if="${u.role.name() == 'ADMIN'}"
                                                class="btn btn--ghost btn--sm" disabled>Không thể khóa</button>
                                        <!-- USER / PARTNER đang active: nút Khóa -->
                                        <button th:if="${u.role.name() != 'ADMIN' and u.active}"
                                                class="btn btn--danger btn--sm btn-toggle-status"
                                                th:data-id="${u.id}" th:data-name="${u.fullName}">
                                            🔒 Khóa
                                        </button>
                                        <!-- USER / PARTNER bị khóa: nút Mở khóa -->
                                        <button th:if="${u.role.name() != 'ADMIN' and !u.active}"
                                                class="btn btn--sm btn-toggle-status"
                                                style="background:var(--color-success);color:#fff;border:none;border-radius:6px;padding:6px 12px"
                                                th:data-id="${u.id}" th:data-name="${u.fullName}">
                                            🔓 Mở khóa
                                        </button>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(users)}">
                                    <td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:32px">Chưa có người dùng nào</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>

        <script th:src="@{/assets/js/main.js}"></script>
        <script th:src="@{/assets/js/admin.js}"></script>
        <script>
            document.querySelectorAll('.btn-toggle-status').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    const name = this.dataset.name;
                    const isLock = this.textContent.includes('Khóa') && !this.textContent.includes('Mở');
                    if (!confirm((isLock ? 'Khóa' : 'Mở khóa') + ' tài khoản "' + name + '"?')) return;
                    fetch('/api/admin/users/' + id + '/toggle-status', { method: 'PUT' })
                        .then(r => r.json())
                        .then(data => { alert(data.message); if (data.success) location.reload(); })
                        .catch(() => alert('Lỗi kết nối server'));
                });
            });

            // Filter by status
            document.getElementById('filter-status').addEventListener('change', function () {
                const val = this.value;
                document.querySelectorAll('tbody tr[data-role]').forEach(row => {
                    if (!val) { row.style.display = ''; return; }
                    const isActive = row.dataset.active === 'true';
                    row.style.display = (val === 'active' ? isActive : !isActive) ? '' : 'none';
                });
            });
        </script>
    </body>
</html>
