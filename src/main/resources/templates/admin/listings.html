<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quản lý nơi lưu trú – Admin TravelMate</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
        <link rel="stylesheet" th:href="@{/assets/pages/admin.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/responsive.css}" />
    </head>
    <body>
        <div class="admin-wrapper">
            <aside th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></aside>
            <div class="admin-sidebar-overlay"></div>

            <div class="admin-main">
                <header class="admin-topbar">
                    <div style="display:flex;align-items:center;gap:var(--space-4)">
                        <button class="admin-topbar__hamburger"><span></span><span></span><span></span></button>
                        <h1 class="admin-topbar__title">🏨 Quản lý nơi lưu trú</h1>
                    </div>
                    <div class="admin-topbar__actions">
                        <a th:href="@{/accommodations}" class="btn btn--outline btn--sm" target="_blank">🌐 Xem ngoài site</a>
                    </div>
                </header>

                <main class="admin-content">
                    <div class="page-header">
                        <div>
                            <h2 class="page-header__title">Danh sách nơi lưu trú</h2>
                            <p class="page-header__subtitle" th:text="${#lists.size(accommodations)} + ' nơi lưu trú tổng cộng'">0 nơi lưu trú</p>
                        </div>
                    </div>

                    <!-- Filter Tabs -->
                    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-5);flex-wrap:wrap">
                        <button class="filter-tab active" data-filter="all">Tất cả</button>
                        <button class="filter-tab" data-filter="pending">Chờ duyệt</button>
                        <button class="filter-tab" data-filter="approved">Đã duyệt</button>
                        <button class="filter-tab" data-filter="rejected">Từ chối</button>
                    </div>

                    <div class="table-toolbar">
                        <div class="input-group table-toolbar__search">
                            <span class="input-group__icon">🔍</span>
                            <input type="text" class="form-control" id="table-search" placeholder="Tìm theo tên, thành phố, đối tác..." />
                        </div>
                        <div class="table-toolbar__actions">
                            <select class="form-control" id="filter-type" style="width:150px">
                                <option value="">Tất cả loại</option>
                                <option value="HOTEL">Khách sạn</option>
                                <option value="HOMESTAY">Homestay</option>
                                <option value="VILLA">Villa</option>
                                <option value="APARTMENT">Căn hộ</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-wrap">
                        <table class="table data-table">
                            <thead>
                                <tr>
                                    <th>STT</th>
                                    <th>Ảnh</th>
                                    <th>Tên nơi lưu trú</th>
                                    <th>Loại</th>
                                    <th>Thành phố</th>
                                    <th>Giá/đêm</th>
                                    <th>Đối tác</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="a, iter : ${accommodations}"
                                    th:data-status="${#strings.toLowerCase(a.approvalStatus)}"
                                    th:data-type="${a.propertyType}">
                                    <td th:text="${iter.count}">-</td>
                                    <td>
                                        <img th:if="${a.thumbnailUrl != null}"
                                             th:src="${a.thumbnailUrl}"
                                             class="table-hotel-image" alt=""
                                             style="width:60px;height:45px;object-fit:cover;border-radius:6px"
                                             onerror="this.style.display='none'" />
                                        <div th:if="${a.thumbnailUrl == null}"
                                             style="width:60px;height:45px;background:var(--color-surface-2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px">🏨</div>
                                    </td>
                                    <td>
                                        <div style="font-weight:600" th:text="${a.name}">-</div>
                                        <div style="font-size:12px;color:var(--color-text-muted)" th:text="${a.address}">-</div>
                                    </td>
                                    <td th:text="${a.propertyTypeLabel}">-</td>
                                    <td th:text="${a.city}">-</td>
                                    <td style="font-weight:600;color:var(--color-primary)"
                                        th:text="${a.priceFormatted} + 'đ'">-</td>
                                    <td>
                                        <div style="font-size:13px" th:text="${a.partnerName}">-</div>
                                        <div style="font-size:11px;color:var(--color-text-muted)" th:text="${a.partnerEmail}">-</div>
                                    </td>
                                    <td>
                                        <span class="badge" th:classappend="${a.approvalStatusBadgeClass}" th:text="${a.approvalStatusLabel}">-</span>
                                    </td>
                                    <td>
                                        <div class="table__actions">
                                            <!-- PENDING hoặc REJECTED: nút Duyệt -->
                                            <button th:if="${a.approvalStatus.name() != 'APPROVED'}"
                                                    class="btn btn--sm btn-approve"
                                                    style="background:var(--color-success);color:#fff;border:none;border-radius:6px;padding:6px 12px"
                                                    th:data-id="${a.id}" th:data-name="${a.name}">
                                                ✓ Duyệt
                                            </button>
                                            <!-- PENDING hoặc APPROVED: nút Từ chối -->
                                            <button th:if="${a.approvalStatus.name() != 'REJECTED'}"
                                                    class="btn btn--danger btn--sm btn-reject"
                                                    th:data-id="${a.id}" th:data-name="${a.name}">
                                                ✕ Từ chối
                                            </button>
                                            <!-- REJECTED: chỉ có nút Duyệt (đã hiển thị ở trên) -->
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(accommodations)}">
                                    <td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:32px">Chưa có nơi lưu trú nào</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>

        <script th:src="@{/assets/js/main.js}"></script>
        <script th:src="@{/assets/js/admin.js}"></script>
        <script>
            // Approve
            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    const name = this.dataset.name;
                    if (!confirm('Duyệt "' + name + '"?')) return;
                    fetch('/api/admin/accommodations/' + id + '/approve', { method: 'PUT' })
                        .then(r => r.json())
                        .then(data => { alert(data.message); if (data.success) location.reload(); })
                        .catch(() => alert('Lỗi kết nối server'));
                });
            });

            // Reject
            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    const name = this.dataset.name;
                    if (!confirm('Từ chối "' + name + '"?')) return;
                    fetch('/api/admin/accommodations/' + id + '/reject', { method: 'PUT' })
                        .then(r => r.json())
                        .then(data => { alert(data.message); if (data.success) location.reload(); })
                        .catch(() => alert('Lỗi kết nối server'));
                });
            });

            // Filter by type
            document.getElementById('filter-type').addEventListener('change', function () {
                const val = this.value;
                document.querySelectorAll('tbody tr[data-type]').forEach(row => {
                    row.style.display = (!val || row.dataset.type === val) ? '' : 'none';
                });
            });
        </script>
    </body>
</html>
