<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quản lý đặt phòng – Admin TravelMate</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" th:href="@{/assets/css/base.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/layout.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/components.css}" />
        <link rel="stylesheet" th:href="@{/assets/pages/admin.css}" />
        <link rel="stylesheet" th:href="@{/assets/css/responsive.css}" />
    </head>
    <body>
        <div class="admin-wrapper">
            <aside th:replace="~{fragments/admin-sidebar :: admin-sidebar}"></aside>
            <div class="admin-sidebar-overlay"></div>

            <div class="admin-main">
                <header class="admin-topbar">
                    <div style="display:flex;align-items:center;gap:var(--space-4)">
                        <button class="admin-topbar__hamburger"><span></span><span></span><span></span></button>
                        <h1 class="admin-topbar__title">📋 Quản lý đặt phòng</h1>
                    </div>
                </header>

                <main class="admin-content">
                    <div class="page-header">
                        <div>
                            <h2 class="page-header__title">Danh sách đặt phòng</h2>
                            <p class="page-header__subtitle" th:text="${#lists.size(bookings)} + ' booking tổng cộng'">0 booking</p>
                        </div>
                    </div>

                    <!-- Filter Tabs -->
                    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-5);flex-wrap:wrap">
                        <button class="filter-tab active" data-filter="all">Tất cả</button>
                        <button class="filter-tab" data-filter="pending">Chờ xác nhận</button>
                        <button class="filter-tab" data-filter="confirmed">Đã xác nhận</button>
                        <button class="filter-tab" data-filter="completed">Hoàn thành</button>
                        <button class="filter-tab" data-filter="cancelled">Đã hủy</button>
                    </div>

                    <div class="table-toolbar">
                        <div class="input-group table-toolbar__search">
                            <span class="input-group__icon">🔍</span>
                            <input type="text" class="form-control" id="table-search" placeholder="Tìm mã booking, tên khách, nơi lưu trú..." />
                        </div>
                    </div>

                    <div class="table-wrap">
                        <table class="table data-table">
                            <thead>
                                <tr>
                                    <th>Mã booking</th>
                                    <th>Khách hàng</th>
                                    <th>Nơi lưu trú</th>
                                    <th>Nhận phòng</th>
                                    <th>Trả phòng</th>
                                    <th>Số đêm</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="b : ${bookings}"
                                    th:data-status="${#strings.toLowerCase(b.bookingStatus)}">
                                    <td style="font-family:monospace;font-size:12px;color:var(--color-primary)"
                                        th:text="'#' + ${b.id}">-</td>
                                    <td>
                                        <div style="font-weight:600" th:text="${b.userName}">-</div>
                                        <div style="font-size:12px;color:var(--color-text-muted)" th:text="${b.userPhone}">-</div>
                                    </td>
                                    <td>
                                        <div th:text="${b.accommodationName}">-</div>
                                        <div style="font-size:12px;color:var(--color-text-muted)" th:text="${b.accommodationCity}">-</div>
                                    </td>
                                    <td th:text="${#temporals.format(b.checkIn,'dd/MM/yyyy')}">-</td>
                                    <td th:text="${#temporals.format(b.checkOut,'dd/MM/yyyy')}">-</td>
                                    <td th:text="${b.numNights}">-</td>
                                    <td style="font-weight:600;color:var(--color-primary)"
                                        th:text="${b.totalPriceFormatted} + 'đ'">-</td>
                                    <td>
                                        <span class="badge" th:classappend="${b.statusBadgeClass}" th:text="${b.statusLabel}">-</span>
                                    </td>
                                    <td>
                                        <div class="table__actions">
                                            <!-- PENDING: xác nhận + hủy -->
                                            <th:block th:if="${b.bookingStatus.name() == 'PENDING'}">
                                                <button class="btn btn--sm btn-booking-action"
                                                        style="background:var(--color-success);color:#fff;border:none;border-radius:6px;padding:6px 12px"
                                                        th:data-id="${b.id}" data-status="CONFIRMED">
                                                    ✓ Xác nhận
                                                </button>
                                                <button class="btn btn--danger btn--sm btn-booking-action"
                                                        th:data-id="${b.id}" data-status="CANCELLED">
                                                    Hủy
                                                </button>
                                            </th:block>
                                            <!-- CONFIRMED: hoàn thành + hủy -->
                                            <th:block th:if="${b.bookingStatus.name() == 'CONFIRMED'}">
                                                <button class="btn btn--sm btn-booking-action"
                                                        style="background:var(--color-primary);color:#fff;border:none;border-radius:6px;padding:6px 12px"
                                                        th:data-id="${b.id}" data-status="COMPLETED">
                                                    ✓ Hoàn thành
                                                </button>
                                                <button class="btn btn--danger btn--sm btn-booking-action"
                                                        th:data-id="${b.id}" data-status="CANCELLED">
                                                    Hủy
                                                </button>
                                            </th:block>
                                            <!-- COMPLETED / CANCELLED: chỉ label -->
                                            <th:block th:if="${b.bookingStatus.name() == 'COMPLETED' or b.bookingStatus.name() == 'CANCELLED'}">
                                                <span style="font-size:12px;color:var(--color-text-muted)">–</span>
                                            </th:block>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(bookings)}">
                                    <td colspan="9" style="text-align:center;color:var(--color-text-muted);padding:32px">Chưa có booking nào</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        </div>

        <script th:src="@{/assets/js/main.js}"></script>
        <script th:src="@{/assets/js/admin.js}"></script>
        <script>
            document.querySelectorAll('.btn-booking-action').forEach(btn => {
                btn.addEventListener('click', function () {
                    const id = this.dataset.id;
                    const status = this.dataset.status;
                    const label = status === 'CONFIRMED' ? 'xác nhận'
                                : status === 'COMPLETED' ? 'hoàn thành'
                                : 'hủy';
                    if (!confirm('Bạn chắc chắn muốn ' + label + ' booking #' + id + '?')) return;
                    fetch('/api/admin/bookings/' + id + '/status?status=' + status, { method: 'PUT' })
                        .then(r => r.json())
                        .then(data => {
                            alert(data.message);
                            if (data.success) location.reload();
                        })
                        .catch(() => alert('Lỗi kết nối server'));
                });
            });
        </script>
    </body>
</html>
